name: Bump Version

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      -
        name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
      -
        name: Get gem version
        run: |
          set -euo pipefail
          VERSIONS_JSON=$(curl -fsSL --retry 3 --retry-delay 2 https://pages.github.com/versions.json)
          RUBY_VERSION=$(echo "$VERSIONS_JSON" | jq -r '."ruby"')
          GEM_VERSION=$(echo "$VERSIONS_JSON" | jq -r '."github-pages"')
          if [[ -z "$RUBY_VERSION" || "$RUBY_VERSION" == "null" ]]; then
            echo "::error::Could not obtain RUBY_VERSION from versions.json"
            exit 1
          fi
          if [[ -z "$GEM_VERSION" || "$GEM_VERSION" == "null" ]]; then
            echo "::error::Could not obtain GEM_VERSION from versions.json"
            exit 1
          fi
          echo "RUBY_VERSION=$RUBY_VERSION" | tee /dev/stderr >> "$GITHUB_ENV"
          echo "GEM_VERSION=$GEM_VERSION" | tee /dev/stderr >> "$GITHUB_ENV"
      -
        name: Get bundler version
        run: |
          set -euo pipefail
          BUNDLER_VERSION=$(curl -fsSL --retry 3 --retry-delay 2 https://rubygems.org/api/v1/versions/bundler.json | jq -r ".[] | select(.ruby_version) | select(.ruby_version | ltrimstr(\">= \") | split(\".\") <= $(echo \"${RUBY_VERSION}\" | jq -c "split(\".\")")) | select(.number | test(\"^\\\\d+\\\\.\\\\d+\\\\.\\\\d+\$\")) | .number" | head -n1)
          if [[ -z "$BUNDLER_VERSION" || "$BUNDLER_VERSION" == "null" ]]; then
            echo "::error::Could not obtain BUNDLER_VERSION compatible with Ruby ${RUBY_VERSION}"
            exit 1
          fi
          echo "BUNDLER_VERSION=$BUNDLER_VERSION" | tee /dev/stderr >> "$GITHUB_ENV"
      -
        name: Bump
        run: |
          sed Dockerfile -i -e "s/\(FROM ruby\):.*/\1:${RUBY_VERSION}-slim/"
          sed Dockerfile -i -e "s/\(\"github-pages\",\) \"[0-9]\+\"/\1 \"${GEM_VERSION}\"/"
          sed Dockerfile -i -e "s/\(bundler -v\) [0-9.]\+/\1 ${BUNDLER_VERSION}/"
          if ! git diff --exit-code
          then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "Bump version to ${GEM_VERSION}"
            git tag "${GEM_VERSION}"
            git push
            git push origin "refs/tags/${GEM_VERSION}"
          fi
