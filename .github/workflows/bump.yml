name: Bump Version

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
      -
        name: Get gem version
        run: |
          set -euo pipefail
          VERSIONS_JSON=$(curl -fsSL --retry 3 --retry-delay 2 https://pages.github.com/versions.json)
          RUBY_VERSION=$(echo "$VERSIONS_JSON" | jq -r '."ruby"')
          GEM_VERSION=$(echo "$VERSIONS_JSON" | jq -r '."github-pages"')
          if [[ -z "$RUBY_VERSION" || "$RUBY_VERSION" == "null" ]]; then
            echo "::error::Could not obtain RUBY_VERSION from versions.json"
            exit 1
          fi
          if [[ -z "$GEM_VERSION" || "$GEM_VERSION" == "null" ]]; then
            echo "::error::Could not obtain GEM_VERSION from versions.json"
            exit 1
          fi
          echo "RUBY_VERSION=$RUBY_VERSION" | tee /dev/stderr >> "$GITHUB_ENV"
          echo "GEM_VERSION=$GEM_VERSION" | tee /dev/stderr >> "$GITHUB_ENV"
      -
        name: Get bundler version
        run: |
          set -euo pipefail
          BUNDLER_VERSION=$(curl -fsSL --retry 3 --retry-delay 2 https://rubygems.org/api/v1/versions/bundler.json | jq -r "
            def pad_version(\$length):
              . as \$parts
              | \$parts + [range(0; \$length - (\$parts | length)) | 0];
            def version_lte(\$left; \$right):
              ([(\$left | length), (\$right | length)] | max) as \$length
              | (\$left | pad_version(\$length)) as \$left_padded
              | (\$right | pad_version(\$length)) as \$right_padded
              | reduce range(0; \$length) as \$index
                  ({result: true, done: false};
                    if .done then .
                    elif \$left_padded[\$index] < \$right_padded[\$index] then {result: true, done: true}
                    elif \$left_padded[\$index] > \$right_padded[\$index] then {result: false, done: true}
                    else .
                    end
                  )
              | .result;
            .[]
            | select(.ruby_version)
            | select(
                ([.ruby_version | scan(\"[0-9]+(\\\\.[0-9]+)*\")][0]) as \$required_ruby
                | \$required_ruby != null
                  and version_lte(
                    (\$required_ruby | split(\".\") | map(tonumber));
                    $(echo \"${RUBY_VERSION}\" | jq -c 'split(".") | map(tonumber)')
                  )
              )
            | select(.number | test(\"^\\\\d+\\\\.\\\\d+\\\\.\\\\d+\$\"))
            | .number" | head -n1)
          if [[ -z "$BUNDLER_VERSION" || "$BUNDLER_VERSION" == "null" ]]; then
            echo "::error::Could not obtain BUNDLER_VERSION compatible with Ruby ${RUBY_VERSION}"
            exit 1
          fi
          echo "BUNDLER_VERSION=$BUNDLER_VERSION" | tee /dev/stderr >> "$GITHUB_ENV"
      -
        name: Bump
        run: |
          sed Dockerfile -i -e "s/\(FROM ruby\):.*/\1:${RUBY_VERSION}-slim/"
          sed Dockerfile -i -e "s/\(\"github-pages\",\) \"[0-9]\+\"/\1 \"${GEM_VERSION}\"/"
          sed Dockerfile -i -e "s/\(bundler -v\) [0-9.]\+/\1 ${BUNDLER_VERSION}/"
          if ! git diff --exit-code
          then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "Bump version to ${GEM_VERSION}"
            git tag "${GEM_VERSION}"
            git push
            git push origin "refs/tags/${GEM_VERSION}"
          fi
